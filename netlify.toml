[build]
  publish = "."

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/blog"
  to = "/blog.html"
  status = 200

[[headers]]
  for = "/assets/*"
  [headers.values]
    # Cache but always revalidate, so images updated under the same filename
    # are picked up instead of being stuck (previously "immutable" for a year).
    Cache-Control = "public, max-age=3600, must-revalidate"
